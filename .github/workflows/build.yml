name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask nbconvert nbformat werkzeug pandas numpy matplotlib seaborn scikit-learn jupyter ipython
    
    - name: Build application
      run: |
        echo "Building application..."
        python -m py_compile app.py
    
    - name: Check syntax
      run: python -m py_compile app.py scripts/*.py
      continue-on-error: true
    
    - name: Verify directory structure
      run: |
        test -d notebooks && echo "notebooks/ exists"
        test -d datasets && echo "datasets/ exists"
        test -d outputs && echo "outputs/ exists"
        test -d config && echo "config/ exists"
        test -f config/settings.json && echo "config/settings.json exists"
